<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TABAQ — Checkout cancelled</title>
  <link href="assets/site.css" rel="stylesheet" />
  <style>
    body{min-height:100vh;display:grid;place-items:center;background:#fffaf2;color:#130f0d;font-family:Inter,Arial,sans-serif;padding:24px;}
    .cancel-card{width:min(680px,94vw);border-radius:34px;background:#fff;padding:40px;box-shadow:0 30px 90px rgba(20,15,10,.12);}
    h1{font-family:Archivo Black,Inter,sans-serif;font-size:clamp(38px,7vw,78px);line-height:.9;margin:0 0 18px;letter-spacing:-.06em;text-transform:uppercase;}
    p{font-weight:800;color:rgba(20,15,10,.68);line-height:1.45;}
    a{display:inline-flex;margin-top:20px;border-radius:999px;background:#111;color:#fff;text-decoration:none;padding:14px 20px;font-weight:950;}
  </style>
</head>
<body>
  <main class="cancel-card">
    <p style="color:#ff3f2f;text-transform:uppercase;letter-spacing:.12em;font-weight:950;">TABAQ checkout</p>
    <h1>Checkout paused.</h1>
    <p>No payment was completed. Your cart stays saved in the browser, so you can go back and continue when ready.</p>
    <a href="index.html#shop">Return to shop</a>
  </main>
</body>
</html>
